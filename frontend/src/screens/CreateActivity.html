<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#191c1b",
                        "outline": "#707975",
                        "on-tertiary-fixed": "#370e04",
                        "surface": "#f8faf7",
                        "inverse-primary": "#94d3c1",
                        "on-secondary-fixed": "#091d2e",
                        "inverse-on-surface": "#eff1ef",
                        "surface-container-highest": "#e1e3e0",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#eceeec",
                        "secondary": "#4e6073",
                        "surface-bright": "#f8faf7",
                        "surface-tint": "#29695b",
                        "background": "#f8faf7",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#6d382a",
                        "surface-dim": "#d8dbd8",
                        "primary-container": "#004d40",
                        "tertiary-fixed-dim": "#ffb5a1",
                        "on-tertiary-container": "#e89f8c",
                        "primary-fixed": "#afefdd",
                        "tertiary-fixed": "#ffdbd1",
                        "error": "#ba1a1a",
                        "outline-variant": "#bfc9c4",
                        "surface-container-high": "#e7e9e6",
                        "primary-fixed-dim": "#94d3c1",
                        "on-surface-variant": "#3f4945",
                        "on-secondary": "#ffffff",
                        "inverse-surface": "#2e3130",
                        "on-surface": "#191c1b",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#d1e4fb",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#cfe2f9",
                        "tertiary": "#4e2013",
                        "on-primary-fixed": "#00201a",
                        "primary": "#00342b",
                        "on-secondary-fixed-variant": "#36485b",
                        "on-secondary-container": "#526478",
                        "tertiary-container": "#693527",
                        "secondary-fixed-dim": "#b5c8df",
                        "on-error": "#ffffff",
                        "surface-variant": "#e1e3e0",
                        "on-primary-fixed-variant": "#065043",
                        "on-primary-container": "#7ebdac",
                        "on-error-container": "#93000a",
                        "surface-container-low": "#f2f4f1"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-layering-no-border { border: none ! from design system ; }
        .tap-highlight-transparent { -webkit-tap-highlight-color: transparent; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f8faf7]/70 dark:bg-[#191c1b]/70 backdrop-blur-xl flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#e7e9e6]/50 transition-colors scale-95 active:duration-150">
<span class="material-symbols-outlined text-[#004D40] dark:text-[#80cbc4]">arrow_back</span>
</button>
<h1 class="text-xl font-headline font-bold tracking-tight text-[#004D40] dark:text-[#80cbc4]">Tạo Hoạt động</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="pt-24 pb-32 px-6">
<form class="space-y-8">
<!-- Image Upload Section -->
<section class="relative">
<div class="w-full h-48 bg-surface-container-low rounded-xl flex flex-col items-center justify-center border-2 border-dashed border-outline-variant hover:bg-surface-container transition-colors group">
<span class="material-symbols-outlined text-4xl text-on-surface-variant mb-2 group-hover:scale-110 transition-transform">add_a_photo</span>
<span class="font-label text-sm text-on-surface-variant font-medium">Tải ảnh bìa hoạt động</span>
</div>
</section>
<!-- Basic Info Bento Card -->
<div class="space-y-6">
<!-- Activity Name -->
<div class="group">
<label class="block font-headline text-primary font-bold text-sm mb-2 tracking-tight">Tên hoạt động</label>
<input class="w-full bg-transparent border-b-2 border-surface-container-highest focus:border-primary transition-all py-2 outline-none text-on-surface placeholder:text-outline-variant font-medium" placeholder="Ví dụ: Workshop Kỹ năng Tư duy Thiết kế" type="text"/>
</div>
<!-- Description -->
<div class="group">
<label class="block font-headline text-primary font-bold text-sm mb-2 tracking-tight">Mô tả chi tiết</label>
<textarea class="w-full bg-surface-container-low rounded-xl p-4 border-none focus:ring-1 focus:ring-primary transition-all text-on-surface placeholder:text-outline-variant resize-none" placeholder="Mô tả mục tiêu và nội dung hoạt động..." rows="3"></textarea>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Type Selection -->
<div class="col-span-2">
<label class="block font-headline text-primary font-bold text-sm mb-3 tracking-tight">Loại hoạt động</label>
<div class="flex flex-wrap gap-2">
<label class="cursor-pointer">
<input checked="" class="hidden peer" name="type" type="radio"/>
<span class="px-4 py-2 rounded-lg bg-secondary-fixed-dim text-on-secondary-fixed-variant peer-checked:bg-primary peer-checked:text-white transition-all text-xs font-semibold block">Học thuật</span>
</label>
<label class="cursor-pointer">
<input class="hidden peer" name="type" type="radio"/>
<span class="px-4 py-2 rounded-lg bg-secondary-fixed-dim text-on-secondary-fixed-variant peer-checked:bg-primary peer-checked:text-white transition-all text-xs font-semibold block">Workshop</span>
</label>
<label class="cursor-pointer">
<input class="hidden peer" name="type" type="radio"/>
<span class="px-4 py-2 rounded-lg bg-secondary-fixed-dim text-on-secondary-fixed-variant peer-checked:bg-primary peer-checked:text-white transition-all text-xs font-semibold block">Tình nguyện</span>
</label>
<label class="cursor-pointer">
<input class="hidden peer" name="type" type="radio"/>
<span class="px-4 py-2 rounded-lg bg-secondary-fixed-dim text-on-secondary-fixed-variant peer-checked:bg-primary peer-checked:text-white transition-all text-xs font-semibold block">Thể thao</span>
</label>
</div>
</div>
<!-- Location -->
<div class="col-span-2 group">
<label class="block font-headline text-primary font-bold text-sm mb-2 tracking-tight">Địa điểm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline">location_on</span>
<input class="w-full bg-transparent border-b-2 border-surface-container-highest focus:border-primary transition-all py-2 pl-8 outline-none text-on-surface placeholder:text-outline-variant font-medium" placeholder="Hội trường A, Tầng 3..." type="text"/>
</div>
</div>
<!-- Time Selection -->
<div class="col-span-1">
<label class="block font-headline text-primary font-bold text-sm mb-2 tracking-tight">Bắt đầu</label>
<input class="w-full bg-surface-container-low rounded-xl px-3 py-2 border-none text-xs font-medium focus:ring-1 focus:ring-primary" type="datetime-local"/>
</div>
<div class="col-span-1">
<label class="block font-headline text-primary font-bold text-sm mb-2 tracking-tight">Kết thúc</label>
<input class="w-full bg-surface-container-low rounded-xl px-3 py-2 border-none text-xs font-medium focus:ring-1 focus:ring-primary" type="datetime-local"/>
</div>
<!-- Training Points -->
<div class="col-span-2">
<div class="bg-primary-fixed rounded-xl p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-headline font-bold text-on-primary-fixed">Điểm rèn luyện</span>
</div>
<input class="w-16 bg-surface-container-lowest rounded-lg border-none text-center font-bold text-primary focus:ring-2 focus:ring-primary" max="100" min="0" type="number" value="5"/>
</div>
</div>
</div>
</div>
<!-- Submit Button Area -->
<div class="pt-6">
<button class="w-full py-4 bg-primary text-white rounded-full font-headline font-bold text-lg shadow-lg hover:bg-primary-container transition-all active:scale-95 flex items-center justify-center gap-2" type="submit">
<span>Tạo hoạt động</span>
<span class="material-symbols-outlined">rocket_launch</span>
</button>
<p class="text-center text-outline text-xs mt-4 px-8 leading-relaxed">Hoạt động sẽ được gửi phê duyệt trước khi hiển thị công khai trên hệ thống.</p>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-[1.5rem] bg-white dark:bg-[#191c1b] shadow-[0_-12px_24px_rgba(25,28,27,0.06)] flex justify-around items-center h-20 px-4 pb-safe w-full">
<a class="flex flex-col items-center justify-center text-[#191c1b]/60 dark:text-white/60 px-4 py-2 hover:text-[#004D40] transition-all tap-highlight-transparent active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-xs font-medium">Trang chủ</span>
</a>
<a class="flex flex-col items-center justify-center bg-[#004D40] text-white rounded-full px-4 py-2 tap-highlight-transparent active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="event_available">event_available</span>
<span class="font-['Inter'] text-xs font-medium">Hoạt động</span>
</a>
<a class="flex flex-col items-center justify-center text-[#191c1b]/60 dark:text-white/60 px-4 py-2 hover:text-[#004D40] transition-all tap-highlight-transparent active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-['Inter'] text-xs font-medium">Thống kê</span>
</a>
<a class="flex flex-col items-center justify-center text-[#191c1b]/60 dark:text-white/60 px-4 py-2 hover:text-[#004D40] transition-all tap-highlight-transparent active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-xs font-medium">Cá nhân</span>
</a>
</nav>
<!-- Background Decoration for Academic Curator Vibe -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-30">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary-fixed blur-[100px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[40%] bg-secondary-fixed blur-[100px] rounded-full"></div>
</div>
</body></html>
